<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<main class="container">
    <header class="page-header">
        <h1 th:text="${formTitle}">Formulario</h1>
        <a class="btn btn-secondary" th:href="@{/products}">Volver</a>
    </header>

    <section class="card">
        <form th:action="@{${formAction}}" th:object="${productForm}" method="post" class="form-layout">
            <div class="field">
                <label for="name">Nombre</label>
                <input id="name" type="text" th:field="*{name}">
                <small class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
            </div>

            <div class="field">
                <label for="price">Precio</label>
                <input id="price" type="number" step="0.01" th:field="*{price}">
                <small class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></small>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Actualizar' : 'Crear'">Guardar</button>
                <a class="btn btn-secondary" th:href="@{/products}">Cancelar</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
