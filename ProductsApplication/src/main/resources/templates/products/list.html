<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<main class="container">
    <header class="page-header">
        <h1>Productos</h1>
        <a class="btn btn-primary" th:href="@{/products/new}">Nuevo producto</a>
    </header>

    <section class="card">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio base</th>
                <th>Precio final</th>
                <th>Moneda</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(products)}">
                <td colspan="6">No hay productos registrados.</td>
            </tr>

            <tr th:each="product : ${products}">
                <td th:text="${product.id}">1</td>
                <td th:text="${product.name}">Laptop</td>
                <td th:text="${product.price}">1000</td>
                <td th:text="${product.finalPrice}">1130</td>
                <td th:text="${product.currency}">CRC</td>
                <td class="actions">
                    <a class="btn btn-secondary" th:href="@{/products/{id}(id=${product.id})}">Ver</a>
                    <a class="btn btn-warning" th:href="@{/products/{id}/edit(id=${product.id})}">Editar</a>

                    <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" class="inline-form">
                        <button type="submit" class="btn btn-danger">Eliminar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
